<!DOCTYPE html>
<html>
<head>
    <title>You Awaken in a Strange Place</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>YOU AWAKEN IN A STRANGE PLACE</h1>
<p><em>Any Genre. Any Character. Any Adventure.</em></p>


<div class="card">

    <h2>Worldbuilding</h2>

    <div class="world-row">

        <div>
            <label>Genre</label>
            <input type="text" id="genre">
        </div>

        <div>
            <label>Adjective</label>
            <input type="text" id="adjective">
        </div>

        <div>
            <label>Location</label>
            <input type="text" id="location">
        </div>

    </div>

    <label>Player 1 Statement</label>
    <textarea id="player1"></textarea>

    <label>Player 2 Statement</label>
    <textarea id="player2"></textarea>

    <label>Player 3 Statement</label>
    <textarea id="player3"></textarea>

</div>


<div class="card">

    <h2>Character Information</h2>

    <label>Character Name</label>
    <input type="text" id="characterName">

    <label>Character Description</label>
    <textarea id="bio"></textarea>

</div>

<div class="play-area">
    
<div class="card">

    <h2>Character Stats</h2>

    <div class="stats-row">

       <div class="stat-group">

    <label>HP</label>

<div id="hpContainer"></div>
<label>Resources</label>

<div id="resourceContainer"></div>

        </div>

    </div>


    <h2>Skills</h2>

    <table class="skills-table">

        <tr>
            <td>+2</td>
            <td><input type="text" id="skill1"></td>

            <td>+0</td>
            <td><input type="text" id="skill2"></td>

            <td>+0</td>
            <td><input type="text" id="skill3"></td>

            <td>+0</td>
            <td><input type="text" id="skill4"></td>
        </tr>

        <tr>
            <td>+1</td>
            <td><input type="text" id="skill5"></td>

            <td>+0</td>
            <td><input type="text" id="skill6"></td>

            <td>+0</td>
            <td><input type="text" id="skill7"></td>

            <td>+0</td>
            <td><input type="text" id="skill8"></td>
        </tr>

        <tr>
            <td>-1</td>
            <td><input type="text" id="skill9"></td>

            <td>+0</td>
            <td><input type="text" id="skill10"></td>

            <td>+0</td>
            <td><input type="text" id="skill11"></td>

            <td>+0</td>
            <td><input type="text" id="skill12"></td>
        </tr>

        <tr>
            <td>-2</td>
            <td><input type="text" id="skill13"></td>

            <td>+0</td>
            <td><input type="text" id="skill14"></td>

            <td>+0</td>
            <td><input type="text" id="skill15"></td>

            <td>+0</td>
            <td><input type="text" id="skill16"></td>
        </tr>

    </table>

    <h2>Notes</h2>

    <textarea id="notes"></textarea>

</div>

<div class="dice-column">
    
    <div class="card">
         <button onclick="rollDice()">🎲 Roll</button>

        <h3 id="rollResult">Ready!</h3>
 
        <div id="rollHistory"></div>

    </div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
